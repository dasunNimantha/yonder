name: Build

# Triggers:
#   - push / PR to main → build all 3 platforms; upload binaries as
#     workflow artifacts (downloadable from the Actions tab for 14 days)
#   - tag push v*       → same builds, plus a draft GitHub Release with
#                          all binaries attached so they're easy to grab
#                          from the Releases tab. Draft = nothing is
#                          published until you click Publish.
#   - workflow_dispatch → manual run from the Actions tab
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  # `contents: write` is required only for tag pushes that create a
  # draft Release. It's harmless on the other triggers because nothing
  # in those code paths writes to the repo.
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux (x86_64)
            platform: ubuntu-24.04
            args: ""
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
          - label: macOS (Apple Silicon)
            platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - label: macOS (Intel)
            platform: macos-latest
            args: --target x86_64-apple-darwin
            artifact_glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - label: Windows (x86_64)
            platform: windows-latest
            args: ""
            artifact_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri-action does the dance of running the tauri-cli, picking up
      # bundle config from tauri.conf.json, and (on tag pushes) creating
      # a draft GitHub Release with the resulting installers attached.
      # Without `tagName`/`releaseName` the action just builds.
      - name: Build (no release)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Build & attach to draft release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          releaseBody: |
            Yonder ${{ github.ref_name }}

            See assets below for installers and binaries.
            - Windows: `.msi` installer or `.exe` (NSIS)
            - macOS: `.dmg` (Apple Silicon and Intel builds)
            - Linux: `.deb`, `.rpm`, `.AppImage`
          args: ${{ matrix.args }}

      # Always upload to the Actions artifacts area so binaries are
      # downloadable from any successful run, not just tagged ones.
      - name: Upload binaries as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yonder-${{ matrix.platform }}${{ matrix.args && '-' || '' }}${{ matrix.args && (contains(matrix.args, 'aarch64') && 'arm64' || 'x86_64') || '' }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn
          retention-days: 14
